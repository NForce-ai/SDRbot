name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Build executable
        run: |
          uv run pyinstaller sdrbot.spec

      # ── macOS: Sign, notarize, and staple ──
      - name: Import signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          # Decode the .p12 certificate from base64
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12

          # Verify the .p12 is valid and password works
          echo "Certificate file size: $(wc -c < certificate.p12) bytes"
          openssl pkcs12 -in certificate.p12 -passin pass:"$MACOS_CERTIFICATE_PWD" -nokeys -noout 2>&1 && echo "P12 password verified OK" || echo "P12 password verification FAILED"

          # Create a temporary keychain
          security create-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain

          # Import the certificate
          security import certificate.p12 \
            -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign

          # Allow codesign to access the keychain without prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$MACOS_KEYCHAIN_PWD" build.keychain

          # Clean up
          rm certificate.p12

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_IDENTITY: ${{ secrets.MACOS_IDENTITY }}
        run: |
          codesign --force --deep --timestamp \
            --options runtime \
            --sign "$MACOS_IDENTITY" \
            dist/sdrbot

          # Verify the signature
          codesign --verify --verbose dist/sdrbot

      - name: Notarize binary (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create a zip for notarization (notarytool requires zip/dmg/pkg)
          ditto -c -k --keepParent dist/sdrbot dist/sdrbot.zip

          # Submit for notarization and wait (timeout after 15 minutes)
          xcrun notarytool submit dist/sdrbot.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m \
            --verbose 2>&1 | tee notarization.log

          # Show the log if it failed
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Notarization failed. Fetching detailed log..."
            # Extract submission ID and fetch log if available
            SUB_ID=$(grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' notarization.log | head -1)
            if [ -n "$SUB_ID" ]; then
              xcrun notarytool log "$SUB_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          # Staple the notarization ticket to the binary
          # Note: stapler only works on .app/.dmg/.pkg, not bare binaries.
          # The notarization ticket is cached by Apple's servers, so Gatekeeper
          # will validate it online. For offline support we'd need a .dmg wrapper.

          # Clean up the zip
          rm dist/sdrbot.zip

      - name: Clean up keychain (macOS)
        if: runner.os == 'macOS' && always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true

      # ── Common: rename and upload ──
      - name: Set Binary Suffix
        shell: bash
        run: |
          OS_NAME=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          ARCH_NAME=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')
          echo "BINARY_SUFFIX=${OS_NAME}-${ARCH_NAME}" >> $GITHUB_ENV

      - name: Rename Binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            mv dist/sdrbot.exe dist/sdrbot-${{ env.BINARY_SUFFIX }}.exe
          else
            mv dist/sdrbot dist/sdrbot-${{ env.BINARY_SUFFIX }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdrbot-build-${{ runner.os }}
          path: dist/sdrbot-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sdrbot-build-*
          path: binaries
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
          draft: true
